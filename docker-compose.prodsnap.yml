services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: thundercitizen-prodsnap-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thundercitizen
    volumes:
      - prodsnap_postgres_data:/var/lib/postgresql/data
      - ./backups:/backups:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thundercitizen"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/thundercitizen/home:${TC_IMAGE_TAG:-latest}
    build:
      context: .
    container_name: thundercitizen-prodsnap-app
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/thundercitizen?sslmode=disable
      PORT: "8080"
      ENVIRONMENT: production
      # Bogus URL → server logs "muni data unavailable" and moves on.
      # The snapshot already has every curated dataset in the tables.
      MUNI_URL: http://127.0.0.1:1/disabled.json
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -qx OK"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  prodsnap_postgres_data:
